name: Neo (simulación · $0)

# Versión SIN COSTO de Neo: NO ejecuta claude-code-action (no gasta tokens de Anthropic).
# En su lugar finge el trabajo de Neo creando una rama + un PR trivial, para poder probar todo
# el circuito de punta a punta (dispatch → PR → webhook de la App → aviso a la sala de Matrix →
# teardown de Railway) gastando $0.
#
# Cómo dispararlo:
#   1) Desde la web: pestaña Actions → "Neo (simulación · $0)" → Run workflow.   (no necesita nada)
#   2) Con un issue/comentario que mencione "@sim-neo".
#   3) Desde el bot de Matrix: poné NEO_GITHUB_WORKFLOW_FILE=neo-sim.yml y NEO_GITHUB_DEFAULT_REF=dev.
#
# Usa el GITHUB_TOKEN por defecto del runner: NO requiere la GitHub App, ni secrets, ni API key.

on:
  workflow_dispatch:
    inputs:
      request:
        description: "Pedido simulado en lenguaje natural"
        required: false
        type: string
        default: "cambio de prueba"
      requester:
        description: "Quién lo pidió"
        required: false
        type: string
        default: "manual"
      source:
        description: "Origen (matrix | jira | manual)"
        required: false
        type: string
        default: "manual"
  issues:
    types: [opened]
  issue_comment:
    types: [created]

concurrency:
  group: neo-sim-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  neo-sim:
    # Corre si: es dispatch manual, O el texto del evento menciona "@sim-neo"
    # (distinto de "@neo" a propósito, para no chocar nunca con el workflow real que SÍ cobra).
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.comment.body, '@sim-neo') ||
      contains(github.event.issue.body, '@sim-neo') ||
      contains(github.event.issue.title, '@sim-neo')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write        # crear la rama y el commit
      pull-requests: write   # abrir el PR
      issues: write          # comentar en el issue de origen
    # Todo el contenido controlable por el usuario viaja como env (evita inyección de shell).
    env:
      GH_TOKEN: ${{ github.token }}
      EVENT_NAME: ${{ github.event_name }}
      REQUEST: ${{ inputs.request }}
      REQUESTER: ${{ inputs.requester }}
      SOURCE: ${{ inputs.source }}
      ACTOR: ${{ github.actor }}
      COMMENT_BODY: ${{ github.event.comment.body }}
      ISSUE_TITLE: ${{ github.event.issue.title }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      RUN_ID: ${{ github.run_id }}
      BASE_REF: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Simular el trabajo de Neo (rama + PR, sin LLM)
        run: |
          set -euo pipefail

          # 1) Resolver el pedido según de dónde vino el disparo.
          case "$EVENT_NAME" in
            workflow_dispatch) req="$REQUEST";       who="$REQUESTER"; src="$SOURCE" ;;
            issue_comment)     req="$COMMENT_BODY";  who="$ACTOR";     src="github-comment" ;;
            *)                 req="$ISSUE_TITLE";   who="$ACTOR";     src="github-issue" ;;
          esac
          # Una sola línea para el título; recorto por las dudas.
          req_line="$(printf '%s' "$req" | tr '\n' ' ' | cut -c1-100)"

          branch="neo-sim/run-${RUN_ID}"
          git config user.name  "neo-bot (sim)"
          git config user.email "neo-bot-sim@users.noreply.github.com"
          git checkout -b "$branch"

          # 2) Cambio trivial: dejar registro del pedido simulado.
          mkdir -p docs/neo
          {
            echo "## Simulación run ${RUN_ID} ($(date -u +%FT%TZ))"
            echo ""
            echo "- **Pedido:** ${req_line}"
            echo "- **Solicitado por:** ${who}"
            echo "- **Origen:** ${src}"
            echo ""
          } >> docs/neo/sim-log.md

          git add docs/neo/sim-log.md
          git commit -m "sim(neo): ${req_line}"
          git push origin "$branch"

          # 3) Cuerpo del PR (con printf, robusto dentro del bloque YAML).
          printf '%s\n' \
            "PR **simulado** por \`neo-sim\` — sin costo de Anthropic (no corrió \`claude-code-action\`)." \
            "" \
            "- **Pedido:** ${req_line}" \
            "- **Por:** ${who}" \
            "- **Origen:** ${src}" \
            "- **Run:** ${RUN_ID}" \
            "" \
            "Este PR reemplaza el paso real de Claude Code para validar el circuito de punta a punta" \
            "(dispatch -> PR -> webhook -> aviso a la sala). No mergear: es de prueba." \
            > /tmp/pr-body.md

          # 4) Abrir el PR contra la rama por defecto.
          pr_url="$(gh pr create \
            --base "$BASE_REF" \
            --head "$branch" \
            --title "🤖 [sim] ${req_line}" \
            --body-file /tmp/pr-body.md)"
          echo "PR simulado creado: $pr_url"
          echo "### 🤖 Neo (sim): PR creado → $pr_url" >> "$GITHUB_STEP_SUMMARY"

          # 5) Si vino de un issue, comentar ahí el enlace al PR.
          if [ -n "${ISSUE_NUMBER:-}" ]; then
            gh issue comment "$ISSUE_NUMBER" \
              --body "🤖 (sim) Listo, abrí un PR de prueba: ${pr_url}"
          fi
