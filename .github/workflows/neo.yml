name: Neo — asistente de desarrollo

# Neo se dispara de dos formas:
#  1) Mención "@neo" en un issue, comentario de issue o comentario de revisión de PR  (modo tag)
#  2) workflow_dispatch con un prompt explícito, usado por el bot de Matrix (!neo)      (modo prompt)
#
# Autenticación: GitHub App "neo-bot" (no el GITHUB_TOKEN por defecto), para que los PRs queden
# autoría de la App y la protección de rama impida que Neo mergee sus propios PRs.

on:
  issues:
    types: [opened, assigned]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      request:
        description: "Pedido en lenguaje natural para Neo"
        required: true
        type: string
      requester:
        description: "Quién lo pidió (usuario de Matrix/Jira)"
        required: false
        type: string
        default: "matrix"
      source:
        description: "Origen del disparo (matrix | jira | manual)"
        required: false
        type: string
        default: "manual"

# Cancela corridas viejas del mismo hilo si llega un pedido nuevo.
concurrency:
  group: neo-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  neo:
    # Corre solo si: es un dispatch manual, O el texto del evento menciona "@neo".
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.comment.body, '@neo') ||
      contains(github.event.issue.body, '@neo') ||
      contains(github.event.issue.title, '@neo') ||
      contains(github.event.review.body, '@neo')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write        # crear ramas y commits
      pull-requests: write   # abrir PRs y comentar
      issues: write          # comentar en issues
      id-token: write        # OIDC (requerido por la action)
      actions: read          # leer estado de workflows
    steps:
      # Token de la GitHub App neo-bot (acotada a los repos autorizados).
      - name: Generar token de la App neo-bot
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          # client-id = el "Client ID" de la App (string tipo Iv23...), NO el número 4039629.
          # Está en la página General de la App. Cargalo en el secret NEO_APP_CLIENT_ID.
          client-id: ${{ secrets.NEO_APP_CLIENT_ID }}
          private-key: ${{ secrets.NEO_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          token: ${{ steps.app-token.outputs.token }}

      - name: Ejecutar Neo (Claude Code)
        uses: anthropics/claude-code-action@v1
        with:
          # Auth con tu suscripción Claude (Pro/Max), no API metered.
          # Generá el token local con `claude setup-token` y guardalo como secret
          # CLAUDE_CODE_OAUTH_TOKEN. NO pongas además anthropic_api_key: son excluyentes.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          trigger_phrase: "@neo"
          # Temporal: mostrar el output completo de Claude en el log para depurar el is_error.
          # Quitar una vez que ande (el log queda visible para quien tenga acceso al repo).
          show_full_output: true
          # En modo tag (mención) dejamos prompt vacío: la action lee el comentario/issue.
          # En modo dispatch (bot de Matrix/Jira) pasamos el pedido explícito.
          prompt: "${{ github.event_name == 'workflow_dispatch' && format('Pedido de {0} (via {1}): {2}. Implementa el cambio en una rama nueva, verifica con la verificacion minima del repo (ver CLAUDE.md) y abri un Pull Request con descripcion clara. No mergees el PR.', inputs.requester, inputs.source, inputs.request) || '' }}"
          claude_args: "--max-turns 30"
